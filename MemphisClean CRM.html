<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MemphisClean CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://sdk.twilio.com/js/voice/releases/2.12.0/twilio.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="crm-data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: #F8F9FC; color: #1A1D2E; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
  input:focus, select:focus, textarea:focus { border-color: #2B3990 !important; box-shadow: 0 0 0 3px rgba(43,57,144,0.12); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="crm-ui.jsx"></script>
<script type="text/babel" src="crm-auth.jsx"></script>
<script type="text/babel" src="crm-views.jsx"></script>
<script type="text/babel" src="crm-detail.jsx"></script>
<script type="text/babel" src="crm-import.jsx"></script>
<script type="text/babel" src="crm-calendar.jsx"></script>
<script type="text/babel" src="crm-manager.jsx"></script>
<script type="text/babel" src="crm-email.jsx"></script>
<script type="text/babel" src="crm-voice.jsx"></script>

<script type="text/babel">

const { useState, useEffect } = React;

const STORAGE_KEY = 'memphisclean_crm_v1';
const AUTH_KEY = 'memphisclean_crm_auth';

function loadContacts() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // Clear any old pre-populated sample data (ids starting with 'c' followed by single digit)
      const hasSampleData = parsed.some(c => /^c\d$/.test(c.id));
      if (hasSampleData) { localStorage.removeItem(STORAGE_KEY); return []; }
      return parsed;
    }
  } catch (e) {}
  return [];
}

function loadSession() {
  try {
    const saved = localStorage.getItem(AUTH_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return null;
}

function App() {
  const [currentUser, setCurrentUser] = useState(loadSession);
  const [view, setView] = useState('queue');
  const [contacts, setContacts] = useState(loadContacts);
  const [activeContact, setActiveContact] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);

  // Persist contacts
  useEffect(() => {
    try {localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts));} catch (e) {}
  }, [contacts]);

  const handleLogin = (user) => {
    setCurrentUser(user);
    try {localStorage.setItem(AUTH_KEY, JSON.stringify(user));} catch (e) {}
    // Default view per role
    setView(user.role === 'admin' ? 'dashboard' : 'queue');
  };

  const handleLogout = () => {
    setCurrentUser(null);
    try {localStorage.removeItem(AUTH_KEY);} catch (e) {}
    setActiveContact(null);
  };

  // Scope contacts to current user if rep
  const scopedContacts = currentUser && currentUser.role === 'rep' ?
  contacts.filter((c) => c.assignedTo === currentUser.id) :
  contacts;

  const openContact = (c) => {
    const fresh = contacts.find((x) => x.id === c.id) || c;
    setActiveContact(fresh);
  };

  const updateContact = (updated) => {
    setContacts((prev) => prev.map((c) => c.id === updated.id ? updated : c));
    setActiveContact(updated);
  };

  const addContact = (newContact) => {
    // Assign to current rep, or u1 if admin
    const withAssign = { ...newContact, assignedTo: currentUser?.role === 'rep' ? currentUser.id : newContact.assignedTo || 'u1' };
    setContacts((prev) => [withAssign, ...prev]);
    setShowAddModal(false);
  };

  const importContacts = (newContacts) => {
    setContacts((prev) => [...newContacts, ...prev]);
  };

  // Show login screen if not authenticated
  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar view={view} setView={setView} contacts={scopedContacts} currentUser={currentUser} onLogout={handleLogout} />

      <main style={{ flex: 1, overflowY: 'auto', background: '#F8F9FC' }}>
        {view === 'dashboard' &&
        <Dashboard contacts={scopedContacts} onOpenContact={openContact} />
        }
        {view === 'queue' &&
        <CallQueue contacts={scopedContacts} setContacts={setContacts} onOpenContact={openContact} />
        }
        {view === 'pipeline' &&
        <Pipeline contacts={scopedContacts} setContacts={setContacts} onOpenContact={openContact} />
        }
        {view === 'contacts' &&
        <AllContacts contacts={scopedContacts} onOpenContact={openContact} onAddContact={() => setShowAddModal(true)} />
        }
        {view === 'import' &&
        <ImportLeads onImport={(newContacts) => {importContacts(newContacts);setTimeout(() => setView('queue'), 1200);}} />
        }
        {view === 'calendar' &&
        <CalendarView contacts={scopedContacts} onOpenContact={openContact} />
        }
        {view === 'manager' &&
        <ManagerDashboard contacts={contacts} />
        }
        {view === 'settings' &&
        <RepManager />
        }
      </main>

      {activeContact &&
      <ContactDetail
        contact={activeContact}
        onClose={() => setActiveContact(null)}
        onUpdate={updateContact} />

      }

      {showAddModal &&
      <AddContactModal
        onSave={addContact}
        onClose={() => setShowAddModal(false)} />

      }
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
